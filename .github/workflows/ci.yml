name: CI

# PR(및 dev push) 시 lint / format / 단위 테스트를 강제 검증한다.
# 로컬 scripts/check-local.sh (pre-commit + unittest)와 동일한 기준을
# GitHub에서 우회 불가능하게 적용하는 것이 목적이다.

on:
  pull_request:
    branches: ["dev"]
  push:
    branches: ["dev"]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "ruff==0.11.8" coverage

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run unit tests with coverage
        run: |
          coverage run --source=crawler -m unittest discover -s tests -p "test_*.py"
          coverage report
